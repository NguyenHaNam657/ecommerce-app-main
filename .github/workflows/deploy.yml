name: Build and Deploy to EC2

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nguyenhanam657/ecommerce-app-main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Backend
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/nguyenhanam657/ecommerce-app-main/backend:${{ github.sha }}
            ghcr.io/nguyenhanam657/ecommerce-app-main/backend:latest

      # Frontend
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: ${{ github.ref == 'refs/heads/main' }}
          build-args: |
            REACT_APP_API_URL=/api
          tags: |
            ghcr.io/nguyenhanam657/ecommerce-app-main/frontend:${{ github.sha }}
            ghcr.io/nguyenhanam657/ecommerce-app-main/frontend:latest

  deploy:
    needs: build

    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}

          script: |
            set -e

            echo "🚀 Deploying..."

            cd /home/ec2-user/ecommerce-app

            git fetch origin main
            git reset --hard origin/main

            if [ ! -f .env ]; then
              cp .env.example .env
              echo "⚠️ Created .env from template"
            fi

            docker compose pull
            docker compose down
            docker compose up -d

            echo "✅ Deployment completed"

            docker ps

